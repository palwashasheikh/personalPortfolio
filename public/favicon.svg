<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#12183a" />
      <stop offset="100%" stop-color="#070a1e" />
    </radialGradient>
    
    <!-- Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe293" />
      <stop offset="50%" stop-color="#dfab36" />
      <stop offset="100%" stop-color="#8a640f" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Circle with Gold Border -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  <rect x="16" y="16" width="480" height="480" rx="112" stroke="url(#goldGrad)" stroke-width="8" stroke-opacity="0.8" />
  
  <!-- Stylized Monogram P / Coding symbol -->
  <!-- A code bracket < in gold, plus a neat letter P inside -->
  <path d="M160 180 L110 256 L160 332" stroke="url(#goldGrad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M352 180 L402 256 L352 332" stroke="url(#goldGrad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Letter P in the center -->
  <path d="M220 350 V162 C220 162, 280 150, 310 180 C340 210, 320 260, 270 265 H220" stroke="url(#goldGrad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" filter="url(#goldGlow)" />
</svg>
